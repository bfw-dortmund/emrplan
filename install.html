<!DOCTYPE html>
<html lang="de">

<head>
    <title>emrp Installation</title>
    <meta charset="utf-8">
    <link rel="manifest" href="manifest.json">

    <style>

    </style>
</head>

<body>
    <p>Installation</p>
    <button id="installButton" type="button" hidden>Installieren</button>
    <button id="startButton" type="button" onclick="location.replace('./')">Starten</button>
    <script>
        let installPrompt = null;

        window.addEventListener("beforeinstallprompt", (event) => {
            event.preventDefault();
            installPrompt = event;
            installButton.removeAttribute("hidden");
            startButton.setAttribute("hidden", "hidden");
        });

        window.addEventListener("appinstalled", (event) => {
            console.log("Thank you for installing our app!", event);
            window.location.replace('./');
        });

        installButton.addEventListener("click", async () => {
            if (!installPrompt) {
                return;
            }
            const result = await installPrompt.prompt();
            console.log(`Install prompt was: ${result.outcome}`);
            installPrompt = null;
            installButton.setAttribute("hidden", "");
        });
    </script>
</body>

</html>
